paper_fetch:
  db_path: data/papers.db
  papers_dir: data/papers
  max_downloaded_papers: 100
  sources:
    arxiv:
      timeout_seconds: 30
      default_query: "all:machine learning"
      default_search_limit: 20
      max_results_multiplier: 3
      download_chunk_size: 65536
    huggingface:
      timeout_seconds: 30
      use_proxy: true
      proxy_url: "http://localhost:7890"
      default_search_limit: 20
      download_chunk_size: 65536
  cli:
    default_online_limit: 20

paper_parse:
  db_path: data/papers.db
  parsed_dir: data/parsed
  pdf:
    dpi: 200
  ollama:
    endpoint: "http://localhost:11434/api/chat"
    model: "glm-ocr"
    prompt: "Text Recognition:"
    timeout_seconds: 300

paper_embedding:
  db_path: data/papers.db
  embedding_table: paper_embeddings
  default_top_k: 5
  default_batch_size: 8
  ollama:
    endpoint: "http://localhost:11434/api/embed"
    model: "qwen3-embedding:0.6b"
    timeout_seconds: 120

paper_activity:
  db_path: data/papers.db
  table_name: activity
  cli:
    default_limit: 100

paper_report:
  db_path: data/papers.db
  table_name: report
  reports_dir: data/reports
  cli:
    default_limit: 100

paper_recommand:
  db_path: data/papers.db
  paper_table: papers
  activity_table: activity
  default_algorithm: fusion
  default_top_k: 20
  plugins:
    semantic:
      enabled: true
      top_k: 20
      weight: 1.0
    interaction:
      enabled: true
      like_weight: 0.45
      note_weight: 0.55
      dislike_penalty: 0.4
      recommended_penalty: 0.08
      weight: 1.0
    time:
      enabled: true
      freshness_window_days: 30
      weight: 1.0
